name: Release

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Permissions required by release-plz to push commits and open PRs.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required so release-plz can compare commits.
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      # 1. Publish any new crate versions and create the GitHub Release + tag.
      #    This is a no-op when no new tag exists yet.
      - name: Release — publish crates & create GitHub Release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set CARGO_REGISTRY_TOKEN in repository secrets when ready to
          # publish on crates.io.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # 2. Open (or update) the "Release PR" that bumps versions + CHANGELOG.
      #    Merging this PR on main will trigger the step above on the next push.
      - name: Release-PR — bump versions & update CHANGELOG
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
