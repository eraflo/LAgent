name: Release-plz

on:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

# Permissions required by release-plz to push commits, create releases, and manage PRs.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required so release-plz can compare commits.
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      # Publish crates and create GitHub Release (runs only when new tags are created).
      - name: Release — publish crates & create GitHub Release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Open (or update) the "Release PR" that bumps versions + CHANGELOG.
      - name: Release-PR — bump versions & update CHANGELOG
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
