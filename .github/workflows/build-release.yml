name: Build Release Artifacts

# Triggered when a GitHub Release is published (either manually or by release-plz).
on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  BINARY: lagent

jobs:
  build:
    name: Build — ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (glibc) ─────────────────────────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz

          # ── Linux (musl — fully static binary) ───────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            apt: musl-tools

          # ── Windows ───────────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary_suffix: .exe

          # ── macOS Intel ───────────────────────────────────────────────────
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz

          # ── macOS Apple Silicon ───────────────────────────────────────────
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install apt dependencies
        if: matrix.apt
        run: sudo apt-get install -y ${{ matrix.apt }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p lagent

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          ARTIFACT="${{ env.BINARY }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARTIFACT" \
            -C "target/${{ matrix.target }}/release" \
            "${{ env.BINARY }}${{ matrix.binary_suffix }}"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $artifact = "${{ env.BINARY }}-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/${{ env.BINARY }}${{ matrix.binary_suffix }}" `
            -DestinationPath $artifact
          "ARTIFACT=$artifact" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
          tag_name: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
