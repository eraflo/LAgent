# git-cliff configuration — used by release-plz for CHANGELOG generation
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.breaking %}⚠️ **BREAKING** {% endif %}\
{{ commit.message | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`]({{ remote.link }}/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""

trim = true

footer = """
<!-- generated by git-cliff -->
"""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

commit_parsers = [
  # Breaking changes bubble up to the top regardless of prefix.
  { message = "^.*!:", group = "⚠️ Breaking Changes" },
  { body = ".*BREAKING CHANGE.*", group = "⚠️ Breaking Changes" },

  { message = "^feat",     group = "🚀 Features" },
  { message = "^fix",      group = "🐛 Bug Fixes" },
  { message = "^perf",     group = "⚡ Performance" },
  { message = "^refactor", group = "🔨 Refactor" },
  { message = "^docs",     group = "📚 Documentation" },
  { message = "^test",     group = "🧪 Tests" },
  { message = "^ci",       group = "🏗 CI/CD" },
  { message = "^chore",    group = "🔧 Miscellaneous", skip = true },
  { message = "^revert",   group = "⏪ Reverts" },
]

# Ignore release-plz's own version-bump commits in the changelog.
commit_preprocessors = [
  { pattern = "^chore\\(release\\):", replace = "" },
]

protect_breaking_commits = true
filter_commits = true
tag_pattern = "v[0-9].*"
